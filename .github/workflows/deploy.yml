name: Auto Deploy Blog

# 触发条件：当代码推送到 master 分支时运行
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取源码
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 根据你的项目修改 Node 版本

      # 3. 安装依赖 (如果是 yarn 请换成 yarn install)
      - name: Install Dependencies
        run: npm install

      # 4. 构建文档
      - name: Build Docs
        run: |
          mkdir -p .temp_deploy
          npx vuepress build docs --dest .temp_deploy
          
      # 5. 部署到 blog_pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .temp_deploy
          publish_branch: blog_pages # 部署目标分支
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"